name: Price Monitor

on:
  schedule:
    # Runs at minute 0 of every 6th hour (UTC). Adjust as you like —
    # cron syntax: minute hour day month weekday
    # Examples:
    #   '0 */6 * * *'  -> every 6 hours
    #   '0 8 * * *'    -> once a day at 08:00 UTC
    #   '0 8,20 * * *' -> twice a day, 08:00 and 20:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: {}  # adds a "Run workflow" button in the GitHub UI for manual testing

# Allows the workflow to push the updated price_history.json back to the repo
permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python price_monitor.py

      - name: Save updated price history back to the repo
        run: |
          git config user.name "price-monitor-bot"
          git config user.email "actions@github.com"
          git add price_history.json
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git push
